name: Build the project
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone the repo
        uses: actions/checkout@v4
        with:
          submodules: true # This is important to get the test files from the submodule
      
      - name: Build the code
        run: |
          sudo apt install -y build-essential python-is-python3
          make
      
      - name: Run Unit Tests
        run: python test_aes.py